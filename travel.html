<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sven Belz | Travel</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <script>
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme) {
            document.documentElement.setAttribute('data-theme', savedTheme);
        }
    </script>
</head>
<body>
    <header class="site-header">
        <div class="header-inner">
            <a href="index.html" class="logo">SVEN BELZ</a>
            <div class="mood-toggle-wrapper">
                <span class="mood-label">Mood</span>
                <label class="switch">
                    <input type="checkbox" id="theme-toggle-checkbox">
                    <span class="slider"></span>
                </label>
            </div>
            <nav class="main-nav">
                <a href="index.html">CANDID STREET PORTRAITS</a>
                <a href="street.html">STREET</a>
                <a href="travel.html" class="active">TRAVEL</a>
                <a href="contact.html">CONTACT</a>
            </nav>
        </div>
    </header>

    <main class="gallery-container">
        <!-- Instagram style grid (3 columns, square aspect ratio) -->
        <div class="ig-grid">
            <div class="grid-item"><img src="https://images.unsplash.com/photo-1501504905252-473c47e087f8?q=80&w=800&auto=format&fit=crop" alt="Travel Photography"></div>
            <div class="grid-item"><img src="https://images.unsplash.com/photo-1476514525535-07fb3b4ae5f1?q=80&w=800&auto=format&fit=crop" alt="Travel Photography"></div>
            <div class="grid-item"><img src="https://images.unsplash.com/photo-1527631746610-bca00a040d60?q=80&w=800&auto=format&fit=crop" alt="Travel Photography"></div>
        </div>
    </main>

    <script src="assets/js/theme.js"></script>
</body>
</html>
