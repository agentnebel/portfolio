<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sven Belz | Street</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <script>
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme) {
            document.documentElement.setAttribute('data-theme', savedTheme);
        }
    </script>
</head>
<body>
    <header class="site-header">
        <div class="header-inner">
            <a href="index.html" class="logo">SVEN BELZ</a>
            <button id="theme-toggle" class="theme-toggle" aria-label="Toggle Dark/Light Mode">
                <span class="theme-label">Toggle Theme</span>
            </button>
            <nav class="main-nav">
                <a href="index.html">CANDID STREET PORTRAITS</a>
                <a href="street.html" class="active">STREET</a>
                <a href="travel.html">TRAVEL</a>
                <a href="contact.html">CONTACT</a>
            </nav>
        </div>
    </header>

    <main class="gallery-container">
        <!-- Instagram style grid (3 columns, square aspect ratio) -->
        <div class="ig-grid">
            <div class="grid-item"><img src="https://images.unsplash.com/photo-1493608759325-1bd79fbb6dc0?q=80&w=800&auto=format&fit=crop" alt="Street Photography"></div>
            <div class="grid-item"><img src="https://images.unsplash.com/photo-1518098268026-4e89f1a2cd8e?q=80&w=800&auto=format&fit=crop" alt="Street Photography"></div>
            <div class="grid-item"><img src="https://images.unsplash.com/photo-1518155981440-ce5995574c8c?q=80&w=800&auto=format&fit=crop" alt="Street Photography"></div>
            <div class="grid-item"><img src="https://images.unsplash.com/photo-1542459020-0490b8f3ca05?q=80&w=800&auto=format&fit=crop" alt="Street Photography"></div>
            <div class="grid-item"><img src="https://images.unsplash.com/photo-1512411516087-3498b8c54db0?q=80&w=800&auto=format&fit=crop" alt="Street Photography"></div>
            <div class="grid-item"><img src="https://images.unsplash.com/photo-1515902120468-1af9dc43a0ff?q=80&w=800&auto=format&fit=crop" alt="Street Photography"></div>
        </div>
    </main>

    <script src="assets/js/theme.js"></script>
</body>
</html>
