<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sven Belz | Street</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    <script>
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme) {
            document.documentElement.setAttribute('data-theme', savedTheme);
        }
    </script>
</head>
<body>
    <header class="site-header">
        <div class="header-inner">
            <a href="index.html" class="logo">SVEN BELZ</a>
            <div class="mood-toggle-wrapper">
                <span class="mood-label">Mood</span>
                <label class="switch">
                    <input type="checkbox" id="theme-toggle-checkbox">
                    <span class="slider"></span>
                </label>
            </div>
            <nav class="main-nav">
                <a href="index.html">FACES</a>
                <a href="scenes.html" class="active">SCENES</a>
                <a href="journeys.html">JOURNEYS</a>
                <a href="connect.html">CONNECT</a>
            </nav>
        </div>
    </header>

    <main class="gallery-container">
        <!-- Instagram style grid (3 columns, square aspect ratio) -->
        <div class="masonry-gallery">
            <div class="grid-item">
                <picture>
                    <source srcset="assets/img/placeholder.webp" type="image/webp">
                    <img src="https://images.unsplash.com/photo-1493608759325-1bd79fbb6dc0?q=80&w=800&auto=format&fit=crop" alt="Street Photography" loading="lazy" decoding="async">
                </picture>
            </div>
            <div class="grid-item">

                </picture>
            </div>

                </picture>

                </picture>
            </div>
            <div class="grid-item">
                <picture>

                </picture>
            </div>
        </div>
    </main>

    <script src="assets/js/theme.js"></script>

</html>
